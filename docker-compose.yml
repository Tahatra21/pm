version: "3.8"

services:
  app:
    build: .
    container_name: projectflow-app
    restart: unless-stopped
    volumes:
      - sqlite-data:/app/data
    environment:
      - NODE_ENV=production
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - GIT_TOKEN=${GIT_TOKEN:-}
    networks:
      - projectflow

  nginx:
    image: nginx:alpine
    container_name: projectflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - projectflow

volumes:
  sqlite-data:
    driver: local

networks:
  projectflow:
    driver: bridge
