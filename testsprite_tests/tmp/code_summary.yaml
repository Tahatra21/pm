version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - Drizzle ORM
  - SQLite
features:
  - name: Auth API
    description: Unified authentication endpoint for login, register, and logout.
    files:
      - app/api/auth/route.ts
    endpoints:
      - method: POST
        path: /api/auth
        description: Perform auth actions (login, register, logout)
        auth_required: false
        request_schema:
          body:
            action: string (login|register|logout)
            email: string
            password: string
            name?: string
        response_schema:
          "200": User or Success
          "201": User (Registration)
          "400": Validation Error
          "401": Unauthorized
          "409": Conflict
  - name: Project Management API
    description: CRUD operations for project resources including members, tasks, and tags.
    files:
      - app/api/projects/[id]/route.ts
      - lib/db/schema.ts
    endpoints:
      - method: GET
        path: /api/projects/[id]
        description: Fetch project details including members, tasks, and progress.
        auth_required: true
        response_schema:
          "200": ProjectDetail
          "404": Error
      - method: PUT
        path: /api/projects/[id]
        description: Update project metadata and tags.
        auth_required: true
        request_schema:
          body:
            title: string
            description: string
            color: string
            streamId: string
            tags: string[]
        response_schema:
          "200": Project
          "500": Error
      - method: DELETE
        path: /api/projects/[id]
        description: Delete a project.
        auth_required: true
        response_schema:
          "200": Success
          "500": Error
known_limitations: []
